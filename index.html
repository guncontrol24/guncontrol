<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>macOS Desktop Simulator</title>
  <link href="https://fonts.googleapis.com/css?family=Raleway:300,400,700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Raleway', 'Segoe UI', sans-serif;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="bg" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><rect fill="%231a1a2e" width="100" height="100"/></pattern></defs><rect fill="url(%23bg)" width="100" height="100"/></svg>');
      background-color: #1a1a2e;
      background-size: 100px 100px;
      color: #fff;
    }

    /* Wallpaper with gradient */
    #wallpaper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      z-index: 1;
    }

    /* Desktop container */
    #desktop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      padding: 20px;
      overflow: hidden;
    }

    /* Desktop icons */
    .desktop-icon {
      position: absolute;
      width: 80px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .desktop-icon-img {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.2s;
    }

    .desktop-icon:hover .desktop-icon-img {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    .desktop-icon-label {
      font-size: 12px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      word-wrap: break-word;
      max-width: 80px;
    }

    /* Top menu bar */
    #menubar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 24px;
      background: rgba(0, 0, 0, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 500;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 12px;
      color: #fff;
    }

    .menu-item {
      margin: 0 15px;
      cursor: pointer;
    }

    #menubar-time {
      margin-left: auto;
    }

    /* Windows container */
    .window {
      position: absolute;
      min-width: 300px;
      min-height: 200px;
      background: rgba(30, 30, 30, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .window.focused {
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
      background: rgba(30, 30, 30, 0.99);
    }

    .window-header {
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(60, 60, 60, 0.8) 0%, rgba(40, 40, 40, 0.9) 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: move;
      user-select: none;
      flex-shrink: 0;
    }

    .window-buttons {
      display: flex;
      gap: 8px;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: transparent;
    }

    .window-btn.close {
      background: #ff5f57;
    }

    .window-btn.minimize {
      background: #febc2e;
    }

    .window-btn.maximize {
      background: #28c940;
    }

    .window-btn:hover {
      opacity: 0.8;
    }

    .window-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .window-content {
      flex: 1;
      overflow: auto;
      padding: 10px;
    }

    /* Finder window */
    .finder-sidebar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .finder-item {
      padding: 8px 12px;
      background: rgba(100, 100, 100, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .finder-item:hover {
      background: rgba(100, 150, 200, 0.4);
    }

    .file-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, 80px);
      gap: 10px;
      padding: 10px 0;
    }

    .file-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .file-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .file-item.selected {
      background: rgba(102, 126, 234, 0.3);
      border: 1px solid rgba(102, 126, 234, 0.5);
    }

    .file-icon {
      font-size: 32px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-name {
      font-size: 11px;
      text-align: center;
      word-break: break-word;
      max-width: 70px;
    }

    /* Safari Browser */
    .safari-toolbar {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: rgba(40, 40, 40, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      align-items: center;
      flex-wrap: wrap;
    }

    .safari-btn {
      background: rgba(100, 100, 100, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .safari-btn:hover {
      background: rgba(100, 150, 200, 0.4);
    }

    .address-bar {
      flex: 1;
      background: rgba(60, 60, 60, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px 10px;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      min-width: 200px;
    }

    .address-bar:focus {
      outline: none;
      background: rgba(80, 80, 80, 0.8);
      border-color: rgba(102, 126, 234, 0.5);
    }

    .browser-content {
      flex: 1;
      background: #fff;
      color: #000;
      overflow: auto;
      padding: 20px;
    }

    /* Video Player */
    .video-player {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    video {
      width: 100%;
      height: auto;
      background: #000;
      border-radius: 4px;
      max-height: 400px;
    }

    .video-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .video-progress {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      cursor: pointer;
    }

    .video-progress-bar {
      height: 100%;
      background: #667eea;
      border-radius: 2px;
      transition: width 0.1s;
    }

    .video-time {
      font-size: 11px;
      min-width: 80px;
    }

    /* Dock at bottom */
    #dock {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 8px 15px;
      display: flex;
      gap: 12px;
      z-index: 400;
      backdrop-filter: blur(10px);
    }

    .dock-item {
      width: 40px;
      height: 40px;
      background: rgba(100, 100, 100, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .dock-item:hover {
      transform: scale(1.2);
      background: rgba(100, 150, 200, 0.4);
    }

    /* Input/Text area */
    input[type="text"],
    textarea {
      background: rgba(50, 50, 50, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 8px;
      border-radius: 4px;
      font-family: 'Raleway', sans-serif;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.8);
      background: rgba(60, 60, 60, 0.9);
    }

    /* Button style */
    button {
      background: rgba(102, 126, 234, 0.6);
      border: 1px solid rgba(102, 126, 234, 0.8);
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(102, 126, 234, 0.8);
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
    }

    /* Right-click context menu */
    #context-menu {
      position: fixed;
      background: rgba(30, 30, 30, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      z-index: 10000;
      display: none;
      min-width: 150px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .context-item {
      padding: 10px 15px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .context-item:hover {
      background: rgba(102, 126, 234, 0.3);
    }

    .context-item:last-child {
      border-bottom: none;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div id="wallpaper"></div>
  
  <div id="menubar">
    <span class="menu-item">Finder</span>
    <span class="menu-item">File</span>
    <span class="menu-item">View</span>
    <span id="menubar-time"></span>
  </div>

  <div id="desktop"></div>

  <div id="dock"></div>

  <div id="context-menu"></div>

  <script>
    // ========== FILE SYSTEM USING LOCALSTORAGE ==========
    class FileSystem {
      constructor() {
        this.init();
      }

      init() {
        if (!localStorage.getItem('fs_root')) {
          const defaultFS = {
            name: 'root',
            type: 'folder',
            children: {
              'Documents': {
                name: 'Documents',
                type: 'folder',
                children: {
                  'Resume.txt': { name: 'Resume.txt', type: 'file', content: 'John Doe - Senior Developer\n\nExperience:\n- 10 years software development\n- Expert in web technologies\n- Full-stack developer' },
                  'Notes.txt': { name: 'Notes.txt', type: 'file', content: 'Project Ideas:\n- Build a desktop simulator\n- Create a web-based OS\n- Implement virtual file system' }
                }
              },
              'Downloads': {
                name: 'Downloads',
                type: 'folder',
                children: {
                  'sample.mp4': { name: 'sample.mp4', type: 'video', url: 'https://www.w3schools.com/html/mov_bbb.mp4' }
                }
              },
              'Pictures': {
                name: 'Pictures',
                type: 'folder',
                children: {
                  'Wallpaper.jpg': { name: 'Wallpaper.jpg', type: 'image', url: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23667eea" width="200" height="200"/><circle cx="100" cy="100" r="50" fill="%23764ba2"/></svg>' }
                }
              },
              'Applications': {
                name: 'Applications',
                type: 'folder',
                children: {}
              }
            }
          };
          localStorage.setItem('fs_root', JSON.stringify(defaultFS));
        }
      }

      getRoot() {
        return JSON.parse(localStorage.getItem('fs_root'));
      }

      getPath(path) {
        const parts = path.split('/').filter(p => p);
        let current = this.getRoot();
        
        for (const part of parts) {
          if (current.children && current.children[part]) {
            current = current.children[part];
          } else {
            return null;
          }
        }
        return current;
      }

      createFile(path, name, type, content = '') {
        const parent = this.getPath(path);
        if (parent && parent.type === 'folder') {
          if (!parent.children) parent.children = {};
          parent.children[name] = {
            name: name,
            type: type,
            content: content
          };
          this.save();
          return true;
        }
        return false;
      }

      createFolder(path, name) {
        const parent = this.getPath(path);
        if (parent && parent.type === 'folder') {
          if (!parent.children) parent.children = {};
          parent.children[name] = {
            name: name,
            type: 'folder',
            children: {}
          };
          this.save();
          return true;
        }
        return false;
      }

      deleteItem(path, name) {
        const parent = this.getPath(path);
        if (parent && parent.children && parent.children[name]) {
          delete parent.children[name];
          this.save();
          return true;
        }
        return false;
      }

      save() {
        localStorage.setItem('fs_root', JSON.stringify(this.getRoot()));
      }
    }

    const fs = new FileSystem();

    // ========== WINDOW MANAGER ==========
    class WindowManager {
      constructor() {
        this.windows = [];
        this.zIndex = 1000;
        this.draggedWindow = null;
        this.dragOffset = {};
        this.setup();
      }

      setup() {
        document.addEventListener('mousedown', (e) => this.onMouseDown(e));
        document.addEventListener('mousemove', (e) => this.onMouseMove(e));
        document.addEventListener('mouseup', (e) => this.onMouseUp(e));
      }

      createWindow(title, content, options = {}) {
        const window = document.createElement('div');
        window.className = 'window focused';
        window.innerHTML = `
          <div class="window-header">
            <div class="window-buttons">
              <div class="window-btn close"></div>
              <div class="window-btn minimize"></div>
              <div class="window-btn maximize"></div>
            </div>
            <div class="window-title">${title}</div>
          </div>
          <div class="window-content">
            ${content}
          </div>
        `;

        window.style.left = (options.x || Math.random() * 500 + 100) + 'px';
        window.style.top = (options.y || Math.random() * 300 + 50) + 'px';
        window.style.width = (options.width || 500) + 'px';
        window.style.height = (options.height || 400) + 'px';

        document.getElementById('desktop').appendChild(window);

        // Button handlers
        window.querySelector('.close').addEventListener('click', () => this.closeWindow(window));
        window.querySelector('.minimize').addEventListener('click', () => this.minimizeWindow(window));
        window.querySelector('.maximize').addEventListener('click', () => this.maximizeWindow(window));

        window.addEventListener('mousedown', () => this.focusWindow(window));

        this.windows.push(window);
        return window;
      }

      onMouseDown(e) {
        const header = e.target.closest('.window-header');
        if (header) {
          const window = header.closest('.window');
          this.draggedWindow = window;
          const rect = window.getBoundingClientRect();
          this.dragOffset = {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
          };
          this.focusWindow(window);
        }
      }

      onMouseMove(e) {
        if (this.draggedWindow) {
          this.draggedWindow.style.left = (e.clientX - this.dragOffset.x) + 'px';
          this.draggedWindow.style.top = (e.clientY - this.dragOffset.y) + 'px';
        }
      }

      onMouseUp() {
        this.draggedWindow = null;
      }

      focusWindow(window) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
        window.classList.add('focused');
        window.style.zIndex = this.zIndex++;
      }

      closeWindow(window) {
        window.remove();
        this.windows = this.windows.filter(w => w !== window);
      }

      minimizeWindow(window) {
        window.style.display = 'none';
      }

      maximizeWindow(window) {
        if (window.style.width === '100%') {
          window.style.width = '500px';
          window.style.height = '400px';
          window.style.left = '100px';
          window.style.top = '50px';
        } else {
          window.style.width = '100%';
          window.style.height = 'calc(100% - 24px)';
          window.style.left = '0';
          window.style.top = '24px';
        }
      }
    }

    const wm = new WindowManager();

    // ========== FINDER WINDOW ==========
    function createFinder(path = '/') {
      const item = fs.getPath(path);
      if (!item || item.type !== 'folder') return;

      let html = `<div class="finder-sidebar">
        <div class="finder-item" onclick="openFinder('/')">📂 Home</div>
        <div class="finder-item" onclick="openFinder('/Documents')">📄 Documents</div>
        <div class="finder-item" onclick="openFinder('/Downloads')">⬇️ Downloads</div>
        <div class="finder-item" onclick="openFinder('/Pictures')">🖼️ Pictures</div>
      </div>`;

      html += `<div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Location: ${path}</div>`;
      html += '<div class="file-list">';

      if (item.children) {
        for (const [name, child] of Object.entries(item.children)) {
          const icon = child.type === 'folder' ? '📁' : 
                       child.type === 'video' ? '🎬' :
                       child.type === 'image' ? '🖼️' : '📄';
          
          html += `<div class="file-item" ondblclick="openFile('${path}', '${name}')">
            <div class="file-icon">${icon}</div>
            <div class="file-name">${name}</div>
          </div>`;
        }
      }

      html += '</div>';

      const window = wm.createWindow('Finder - ' + (path === '/' ? 'Home' : path.split('/').pop()), html, { width: 600, height: 450 });
      return window;
    }

    // ========== SAFARI BROWSER ==========
    function createSafari() {
      const html = `
        <div class="safari-toolbar">
          <button class="safari-btn">← Back</button>
          <button class="safari-btn">→ Forward</button>
          <input type="text" class="address-bar" value="https://example.com" placeholder="Enter URL">
          <button class="safari-btn">🔄</button>
        </div>
        <div class="browser-content">
          <h1>Welcome to Safari</h1>
          <p>This is a simulated browser window.</p>
          <p>Type a URL above or browse the web.</p>
        </div>
      `;

      const window = wm.createWindow('Safari', html, { width: 800, height: 500 });
      return window;
    }

    // ========== VIDEO PLAYER ==========
    function createVideoPlayer(videoPath) {
      const file = fs.getPath(videoPath);
      if (!file || file.type !== 'video') return;

      const html = `
        <div class="video-player">
          <video id="player" controls>
            <source src="${file.url}" type="video/mp4">
            Your browser does not support the video tag.
          </video>
          <div class="video-controls">
            <button onclick="document.getElementById('player').play()">▶️ Play</button>
            <button onclick="document.getElementById('player').pause()">⏸ Pause</button>
            <div class="video-progress">
              <div class="video-progress-bar" style="width: 0%"></div>
            </div>
            <span class="video-time">00:00</span>
          </div>
          <p style="font-size: 12px; color: #aaa; margin-top: 10px;">${file.name}</p>
        </div>
      `;

      const window = wm.createWindow('Video Player - ' + file.name, html, { width: 600, height: 350 });
      
      const video = window.querySelector('video');
      const progressBar = window.querySelector('.video-progress-bar');
      const timeDisplay = window.querySelector('.video-time');

      video.addEventListener('timeupdate', () => {
        const percent = (video.currentTime / video.duration) * 100;
        progressBar.style.width = percent + '%';
        timeDisplay.textContent = formatTime(video.currentTime);
      });

      return window;
    }

    // ========== TEXT EDITOR ==========
    function createTextEditor(path, name, content = '') {
      const html = `
        <div style="display: flex; flex-direction: column; height: 100%; gap: 10px;">
          <textarea id="editor" style="flex: 1; resize: none; font-family: monospace; font-size: 12px;">${content}</textarea>
          <div style="display: flex; gap: 10px;">
            <button onclick="saveFile('${path}', '${name}')">💾 Save</button>
            <button onclick="closeCurrentWindow()">❌ Close</button>
          </div>
        </div>
      `;

      const window = wm.createWindow('Text Editor - ' + name, html, { width: 600, height: 400 });
      return window;
    }

    // ========== DOCK & APPS ==========
    function initDock() {
      const dock = document.getElementById('dock');
      dock.innerHTML = `
        <div class="dock-item" onclick="createFinder('/'); updateDesktopIcons()" title="Finder">📁</div>
        <div class="dock-item" onclick="createSafari()" title="Safari">🌐</div>
        <div class="dock-item" onclick="createVideoPlayer('/Downloads/sample.mp4')" title="Videos">🎬</div>
        <div class="dock-item" onclick="launchFileManager()" title="File Manager">🗂️</div>
      `;
    }

    // ========== DESKTOP ICONS ==========
    function updateDesktopIcons() {
      const desktop = document.getElementById('desktop');
      const existingIcons = desktop.querySelectorAll('.desktop-icon');
      existingIcons.forEach(icon => icon.remove());

      const icons = [
        { name: 'Finder', icon: '📁', x: 20, y: 70, action: () => createFinder('/') },
        { name: 'Downloads', icon: '⬇️', x: 20, y: 160, action: () => createFinder('/Downloads') },
        { name: 'Documents', icon: '📄', x: 20, y: 250, action: () => createFinder('/Documents') },
        { name: 'Safari', icon: '🌐', x: 20, y: 340, action: () => createSafari() }
      ];

      icons.forEach(({ name, icon, x, y, action }) => {
        const el = document.createElement('div');
        el.className = 'desktop-icon';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.innerHTML = `
          <div class="desktop-icon-img">${icon}</div>
          <div class="desktop-icon-label">${name}</div>
        `;
        el.addEventListener('dblclick', action);
        desktop.appendChild(el);
      });
    }

    // ========== UTILITY FUNCTIONS ==========
    function openFile(path, name) {
      const fullPath = path === '/' ? '/' + name : path + '/' + name;
      const file = fs.getPath(fullPath);
      
      if (!file) return;

      if (file.type === 'folder') {
        createFinder(fullPath);
      } else if (file.type === 'video') {
        createVideoPlayer(fullPath);
      } else if (file.type === 'image') {
        const html = `<img src="${file.url}" style="max-width: 100%; max-height: 100%; border-radius: 4px;">`;
        wm.createWindow('Image - ' + name, html, { width: 600, height: 500 });
      } else {
        createTextEditor(path, name, file.content || '');
      }
    }

    function saveFile(path, name) {
      const editor = document.querySelector('#editor');
      if (editor) {
        const fullPath = path === '/' ? '/' + name : path + '/' + name;
        const file = fs.getPath(fullPath);
        if (file) {
          file.content = editor.value;
          fs.save();
          alert('File saved: ' + name);
        }
      }
    }

    function openFinder(path) {
      createFinder(path);
    }

    function launchFileManager() {
      createFinder('/');
    }

    function closeCurrentWindow() {
      const focused = document.querySelector('.window.focused');
      if (focused) wm.closeWindow(focused);
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    // ========== CLOCK ==========
    function updateClock() {
      const now = new Date();
      document.getElementById('menubar-time').textContent = now.toLocaleTimeString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    // ========== INITIALIZATION ==========
    document.addEventListener('DOMContentLoaded', () => {
      updateDesktopIcons();
      initDock();
    });

    // Right-click context menu
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const menu = document.getElementById('context-menu');
      menu.style.display = 'block';
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      menu.innerHTML = `
        <div class="context-item" onclick="createFinder('/')">📁 New Finder Window</div>
        <div class="context-item" onclick="createSafari()">🌐 Open Safari</div>
        <div class="context-item" onclick="updateDesktopIcons()">🔄 Refresh</div>
      `;
    });

    document.addEventListener('click', () => {
      document.getElementById('context-menu').style.display = 'none';
    });
  </script>
</body>
</html>
